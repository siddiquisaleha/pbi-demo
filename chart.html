<!DOCTYPE html>
<html>
<head>
  <title>Visual Slideshow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
  <div class="logo">PBI Demo</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="chart.html">Slideshow</a>
    <a href="embed.html">Embed</a>
  </div>
</div>

<div class="page">

  <h2 id="visualTitle">Loading...</h2>

  <div id="chartContainer"></div>

  <!-- 🎮 Controls -->
  <div class="controls">
    <button onclick="prevSlide()">⏮ Prev</button>
    <button onclick="togglePlay()" id="playBtn">⏸ Pause</button>
    <button onclick="nextSlide()">Next ⏭</button>
  </div>

  <!-- 🔵 Dots -->
  <div id="dots"></div>

</div>
